<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboard - 二手桌遊寄賣大廳</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #F9F5EB; color: #2C3639; margin: 0; padding: 20px; }
        header { background-color: #3F4E4F; color: white; padding: 25px; text-align: center; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { margin: 0; font-size: 24px; letter-spacing: 2px; }
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .game-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid rgba(63, 78, 79, 0.1); }
        .game-title { font-size: 18px; font-weight: bold; color: #3F4E4F; }
        .game-price { font-size: 20px; color: #D67D3E; font-weight: bold; margin: 10px 0; }
        .game-status { display: inline-block; padding: 4px 10px; background-color: rgba(231, 171, 121, 0.2); color: #B8621D; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .loading { text-align: center; color: #3F4E4F; font-weight: bold; padding: 40px; }
    </style>
</head>
<body>
    <header>
        <h1>Laboard</h1>
        <p style="color: #E7AB79; margin: 5px 0 0 0; font-size: 14px;">✦ ✦ 觀塘實體店 · 二手桌遊寄賣大廳 ✦ ✦</p>
    </header>
    <div class="container">
        <h2>🔥 最新上架寄賣桌遊</h2>
        <div id="loadingStatus" class="loading">📡 正在同步 Google 雲端大廳數據...</div>
        <div class="game-grid" id="gameGrid"></div>
    </div>
    <script>
        const FIREBASE_PROJECT_ID = "laboard-vip-app"; 

        async function fetchBoardGames() {
            const url = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents/boardgames`;
            const loadingDiv = document.getElementById('loadingStatus');
            const gridDiv = document.getElementById('gameGrid');
            try {
                const response = await fetch(url);
                const data = await response.json();
                loadingDiv.style.display = 'none';
                if (data.documents && data.documents.length > 0) {
                    data.documents.forEach(doc => {
                        const fields = doc.fields;
                        const name = fields.game_name ? fields.game_name.stringValue : "未命名桌遊";
                        const price = fields.price ? fields.price.integerValue : "0";
                        const status = fields.status ? fields.status.stringValue : "寄賣中";
                        gridDiv.innerHTML += `
                            <div class="game-card">
                                <div class="game-title">${name}</div>
                                <div class="game-status" style="margin-top:5px;">${status}</div>
                                <div class="game-price">$${price} HKD</div>
                            </div>
                        `;
                    });
                } else {
                    loadingDiv.innerText = "📭 目前大廳空空如也，等待 iPad 上架第一款桌遊！";
                }
            } catch (error) {
                loadingDiv.innerText = "❌ 無法與雲端大腦同步，請檢查連線。";
            }
        }
        fetchBoardGames();
    </script>
</body>
</html>
